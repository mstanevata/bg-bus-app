<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG Автогари</title>
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#2c3e50">
</head>
<body>

<div class="app-container">
  <header>
    <h1>BG Автогари</h1>
  </header>
  
  <main>
    <div class="select-row">
      <select id="station-select">
        <option value="">-- Изберете град --</option>
        <option value="sofia">София (Централна)</option>
        <option value="plovdiv">Пловдив (Юг)</option>
        <option value="varna">Варна</option>
        <option value="burgas">Бургас</option>
      </select>

      <select id="day-select">
        <option value="today">Днес</option>
        <option value="tomorrow">Утре</option>
      </select>
    </div>

    <div id="tabs-container" class="tabs hidden">
      <button class="tab-btn active" data-tab="departures">🛫 Заминаващи</button>
      <button class="tab-btn" data-tab="arrivals">🛬 Пристигащи</button>
    </div>

    <div id="schedule-container">
      <ul id="bus-list"></ul>
    </div>
  </main> 
  
  <div class="ad-placeholder">
    <p>Място за реклама</p>
  </div>

  <footer>
    <p>&copy; 2026 Mariyana Staneva</p>
  </footer>
</div>

<script src="script.js" defer></script>

</body>
</html>
