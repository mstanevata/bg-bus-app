<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG Автогари</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
  <header>
    <h1>BG Автогари</h1>
  </header>
  <main>
    <div class="select-row">
      <select id="station-select">
        <option value="">-- Изберете град --</option>
        <option value="sofia">София</option>
        <option value="plovdiv">Пловдив</option>
        <option value="varna">Варна</option>
        <option value="burgas">Бургас</option>
      </select>
    </div>

    <div id="tabs-container" class="tabs hidden">
      <button class="tab-btn active" data-tab="departures">🛫 Заминаващи</button>
      <button class="tab-btn" data-tab="arrivals">🛬 Пристигащи</button>
    </div>

    <div id="loader" class="hidden">Зареждане на разписанието...</div>
    <ul id="bus-list"></ul>
  </main> 
  <footer>
    <p>&copy; 2026 Mariyana Staneva</p>
  </footer>
</div>
<script src="script.js" defer></script>
</body>
</html>
